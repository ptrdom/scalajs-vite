name: Test
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: coursier/cache-action@v8
      - uses: coursier/setup-action@v3
        with:
          jvm: temurin:11
          # Pin to the last sbt 1.x-default launcher: 1.12.13+ defaults to the
          # sbt 2.x runner, which requires JDK 17+ (breaking the JDK 8 matrix)
          # and parses CLI commands differently. Renovate is constrained to not
          # bump past this in renovate.json.
          apps: sbt:1.12.12
      - uses: actions/setup-node@v6
        with:
          node-version: 24.18.0
      - name: Enable Corepack
        run: corepack enable
      - name: Setup yarn
        run: corepack prepare yarn@1.22.19 --activate
      - name: Setup pnpm
        run: corepack prepare pnpm@8.14.3 --activate
      - name: Run tests
        uses: coactions/setup-xvfb@v1
        with:
          run: sbt scalafmtSbtCheck scalafmtCheckAll test scriptedSequentialPerModule
